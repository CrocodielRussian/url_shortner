<div class="page">
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">⌁</span>
        <span class="brand-name">SNIP</span>
      </div>
      <span class="header-note">Короткие URLs</span>
    </div>
  </header>

  <main class="content">
    <section class="auth-card">
      <div class="section-label">Авторизация</div>
      <h1 class="auth-title">Вход в аккаунт</h1>

      <form class="auth-form" #loginForm="ngForm" (ngSubmit)="onLogin()">
        <label class="field">
          <span class="field-label">Логин</span>
          <span class="input-row">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21a8 8 0 0 0-16 0"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input
              class="auth-input"
              type="text"
              id="username"
              [(ngModel)]="username"
              name="username"
              autocomplete="username"
              required>
          </span>
        </label>

        <label class="field">
          <span class="field-label">Пароль</span>
          <span class="input-row">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              class="auth-input"
              type="password"
              id="password"
              [(ngModel)]="password"
              name="password"
              autocomplete="current-password"
              required>
          </span>
        </label>

        <div class="actions">
          <button class="primary-btn" type="submit" [disabled]="!loginForm.valid">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Войти
          </button>

          <button class="secondary-btn" type="button" (click)="onRegister()" [disabled]="!loginForm.valid">
            Зарегистрироваться
          </button>
        </div>
      </form>
    </section>
  </main>
</div>
